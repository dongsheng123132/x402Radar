<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Radar gradient -->
    <radialGradient id="radarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#0052FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0052FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Sweep gradient -->
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0"/>
    </linearGradient>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </radialGradient>
    <!-- Ring glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dot pulse animation -->
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="#1a2744" stroke-width="2"/>

  <!-- Radar glow background -->
  <circle cx="256" cy="256" r="200" fill="url(#radarGlow)"/>

  <!-- Radar rings -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#1a3a5c" stroke-width="1" opacity="0.6"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="#1a3a5c" stroke-width="1" opacity="0.5"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#1a3a5c" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="256" r="55" fill="none" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>

  <!-- Cross hair lines -->
  <line x1="256" y1="56" x2="256" y2="456" stroke="#1a3a5c" stroke-width="0.8" opacity="0.4"/>
  <line x1="56" y1="256" x2="456" y2="256" stroke="#1a3a5c" stroke-width="0.8" opacity="0.4"/>
  <line x1="115" y1="115" x2="397" y2="397" stroke="#1a3a5c" stroke-width="0.5" opacity="0.25"/>
  <line x1="397" y1="115" x2="115" y2="397" stroke="#1a3a5c" stroke-width="0.5" opacity="0.25"/>

  <!-- Radar sweep (frozen at ~45 degree position) -->
  <path d="M256,256 L256,66 A190,190 0 0,1 390,122 Z" fill="url(#sweepGrad)" opacity="0.25"/>

  <!-- Sweep line -->
  <line x1="256" y1="256" x2="390" y2="122" stroke="#00FF88" stroke-width="2" opacity="0.8" filter="url(#glow)"/>

  <!-- Detected dots (x402 transactions) -->
  <circle cx="310" cy="175" r="5" fill="#00FF88" filter="url(#dotGlow)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="210" r="3.5" fill="#00DDFF" filter="url(#dotGlow)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="195" cy="180" r="4" fill="#00FF88" filter="url(#dotGlow)" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="280" r="3" fill="#0088FF" filter="url(#dotGlow)" opacity="0.5"/>
  <circle cx="160" cy="310" r="4.5" fill="#00FF88" filter="url(#dotGlow)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="290" cy="340" r="3" fill="#00DDFF" filter="url(#dotGlow)" opacity="0.4"/>
  <circle cx="220" cy="145" r="3.5" fill="#0088FF" filter="url(#dotGlow)" opacity="0.65">
    <animate attributeName="opacity" values="0.65;0.25;0.65" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="18" fill="#0a1628" stroke="#00FF88" stroke-width="2" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="6" fill="#00FF88" filter="url(#strongGlow)">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- x402 text -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="42" font-weight="bold" fill="#00FF88" filter="url(#glow)" letter-spacing="4">
    x402
  </text>

  <!-- RADAR subtitle -->
  <text x="256" y="448" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="16" fill="#4a8a9a" letter-spacing="8">
    RADAR
  </text>

  <!-- Outer ring accent marks -->
  <!-- Top -->
  <rect x="253" y="60" width="6" height="12" rx="1" fill="#00FF88" opacity="0.6"/>
  <!-- Bottom -->
  <rect x="253" y="440" width="6" height="12" rx="1" fill="#00FF88" opacity="0.6"/>
  <!-- Left -->
  <rect x="60" y="253" width="12" height="6" rx="1" fill="#00FF88" opacity="0.6"/>
  <!-- Right -->
  <rect x="440" y="253" width="12" height="6" rx="1" fill="#00FF88" opacity="0.6"/>

  <!-- Small data readout decorations -->
  <text x="80" y="82" font-family="'SF Mono', monospace" font-size="9" fill="#1a5a5c" opacity="0.7">BASE CHAIN</text>
  <text x="370" y="82" font-family="'SF Mono', monospace" font-size="9" fill="#1a5a5c" opacity="0.7">USDC</text>
  <text x="80" y="445" font-family="'SF Mono', monospace" font-size="9" fill="#1a5a5c" opacity="0.7">LIVE</text>
  <text x="400" y="445" font-family="'SF Mono', monospace" font-size="9" fill="#1a5a5c" opacity="0.7">402</text>
</svg>